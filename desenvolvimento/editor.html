<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor HTML Simples</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #fff;
      padding: 16px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    input[type="text"] {
      flex: 1;
      min-width: 180px;
      padding: 12px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #1e293b;
      color: #fff;
      outline: none;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    textarea {
      width: 100%;
      height: 70vh;
      padding: 14px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #111827;
      color: #e5e7eb;
      resize: vertical;
      outline: none;
      font-family: monospace;
      font-size: 15px;
      line-height: 1.5;
    }

    .info {
      margin-top: 10px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Editor HTML Simples</h1>

    <div class="topbar">
      <input type="text" id="fileName" placeholder="Nome do arquivo" value="meu-arquivo" />
      <button onclick="salvarHTML()">Salvar .html</button>
    </div>

    <textarea id="editor"><!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu HTML</title>
</head>
<body>
  <h1>Olá</h1>
  <p>Escreva seu HTML aqui.</p>
</body>
</html></textarea>

    <div class="info">
      Toque em <strong>Salvar .html</strong> para baixar o arquivo no Android.
    </div>
  </div>

  <script>
    function salvarHTML() {
      const conteudo = document.getElementById("editor").value;
      let nome = document.getElementById("fileName").value.trim();

      if (!nome) nome = "arquivo";
      if (!nome.toLowerCase().endsWith(".html")) {
        nome += ".html";
      }

      const blob = new Blob([conteudo], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = nome;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
