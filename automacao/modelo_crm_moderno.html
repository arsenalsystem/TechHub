<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIND-CRM B2B Pro</title>
    <!-- Tailwind CSS para estilização rápida -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para ícones bonitos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar para o Kanban */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans overflow-x-hidden">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 flex flex-col md:flex-row justify-between items-center gap-4 shadow-md">
        <div class="flex items-center gap-2">
            <i data-lucide="activity" class="text-indigo-500 w-6 h-6"></i>
            <h1 class="text-xl font-bold tracking-wider">MIND-CRM B2B Pro</h1>
        </div>
        <div class="flex flex-wrap gap-3">
            <!-- Botão Importar -->
            <label class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-all font-semibold text-sm cursor-pointer">
                <i data-lucide="upload" class="w-4 h-4"></i> Importar JSON
                <input type="file" id="importFile" accept=".json" class="hidden" onchange="importarJSON(event)">
            </label>
            <!-- Botão Exportar -->
            <button onclick="exportarJSON()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-all font-semibold text-sm">
                <i data-lucide="download" class="w-4 h-4"></i> Exportar JSON
            </button>
        </div>
    </header>

    <!-- Área Principal -->
    <main class="flex-1 p-6 flex flex-col gap-6 overflow-hidden">
        
        <!-- Formulário de Cadastro Rápido -->
        <section class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-sm flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs text-gray-400 font-semibold mb-1 uppercase">Empresa (Lead)</label>
                <input type="text" id="leadName" placeholder="Ex: Clínica OdontoAlfa" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs text-gray-400 font-semibold mb-1 uppercase">Valor Estimado do Projeto</label>
                <input type="number" id="leadValue" placeholder="Ex: 15000" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <button onclick="criarLead()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-lg font-semibold flex items-center gap-2 transition-all">
                <i data-lucide="plus" class="w-5 h-5"></i> Adicionar à Lista
            </button>
        </section>

        <!-- O Funil / Kanban -->
        <section class="flex-1 grid grid-cols-1 md:grid-cols-5 gap-4 overflow-x-auto pb-4 items-start">
            
            <!-- Colunas do Kanban -->
            <div class="bg-gray-800/50 rounded-xl p-3 border border-gray-800 flex flex-col min-w-[250px] max-h-[70vh]">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                    <h3 class="font-bold text-gray-300 text-sm uppercase tracking-wide">1. Lista / Leads</h3>
                    <span id="count-lista" class="bg-gray-700 px-2.5 py-0.5 rounded-full text-xs font-bold text-indigo-400">0</span>
                </div>
                <div id="col-lista" class="flex-1 space-y-3 overflow-y-auto min-h-[150px] pr-1"></div>
            </div>

            <div class="bg-gray-800/50 rounded-xl p-3 border border-gray-800 flex flex-col min-w-[250px] max-h-[70vh]">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                    <h3 class="font-bold text-gray-300 text-sm uppercase tracking-wide">2. Abordagem</h3>
                    <span id="count-abordagem" class="bg-gray-700 px-2.5 py-0.5 rounded-full text-xs font-bold text-indigo-400">0</span>
                </div>
                <div id="col-abordagem" class="flex-1 space-y-3 overflow-y-auto min-h-[150px] pr-1"></div>
            </div>

            <div class="bg-gray-800/50 rounded-xl p-3 border border-gray-800 flex flex-col min-w-[250px] max-h-[70vh]">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                    <h3 class="font-bold text-gray-300 text-sm uppercase tracking-wide">3. Apresentação</h3>
                    <span id="count-apresentacao" class="bg-gray-700 px-2.5 py-0.5 rounded-full text-xs font-bold text-indigo-400">0</span>
                </div>
                <div id="col-apresentacao" class="flex-1 space-y-3 overflow-y-auto min-h-[150px] pr-1"></div>
            </div>

            <div class="bg-gray-800/50 rounded-xl p-3 border border-gray-800 flex flex-col min-w-[250px] max-h-[70vh]">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                    <h3 class="font-bold text-gray-300 text-sm uppercase tracking-wide">4. Follow-up</h3>
                    <span id="count-followup" class="bg-gray-700 px-2.5 py-0.5 rounded-full text-xs font-bold text-indigo-400">0</span>
                </div>
                <div id="col-followup" class="flex-1 space-y-3 overflow-y-auto min-h-[150px] pr-1"></div>
            </div>

            <div class="bg-gray-800/50 rounded-xl p-3 border border-gray-800 flex flex-col min-w-[250px] max-h-[70vh]">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                    <h3 class="font-bold text-emerald-400 text-sm uppercase tracking-wide">5. Fechado</h3>
                    <span id="count-fechado" class="bg-emerald-950 text-emerald-400 px-2.5 py-0.5 rounded-full text-xs font-bold">0</span>
                </div>
                <div id="col-fechado" class="flex-1 space-y-3 overflow-y-auto min-h-[150px] pr-1"></div>
            </div>

        </section>
    </main>

    <!-- Modal para Histórico de Conversação e Observações -->
    <div id="modalLead" class="fixed inset-0 bg-black/75 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-gray-800 border border-gray-700 w-full max-w-2xl rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
            
            <!-- Modal Header -->
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <div>
                    <h2 id="modalLeadTitle" class="text-lg font-bold text-white">Carregando...</h2>
                    <span id="modalLeadUUID" class="text-xs text-gray-500 font-mono"></span>
                </div>
                <button onclick="fecharModal()" class="text-gray-400 hover:text-white">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- Modal Body -->
            <div class="p-6 overflow-y-auto space-y-6 flex-1">
                <!-- Informações Básicas do Lead -->
                <div class="grid grid-cols-2 gap-4 bg-gray-900 p-4 rounded-lg border border-gray-750">
                    <div>
                        <label class="block text-xs text-gray-500 font-bold uppercase mb-1">Nome da Empresa</label>
                        <input type="text" id="modalEditNome" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm text-white focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 font-bold uppercase mb-1">Valor do Contrato (R$)</label>
                        <input type="number" id="modalEditValor" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm text-white focus:outline-none focus:border-indigo-500">
                    </div>
                </div>

                <!-- Nova Interação / Observação -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-gray-300">Adicionar Observação / Registro de Conversa</label>
                    <textarea id="newInteraction" rows="3" placeholder="Ex: Enviei mensagem de acompanhamento pelo WhatsApp. Eles pediram para retornar no final do mês." class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-indigo-500"></textarea>
                    <div class="flex justify-end">
                        <button onclick="adicionarInteracao()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2">
                            <i data-lucide="message-square" class="w-4 h-4"></i> Gravar no Histórico
                        </button>
                    </div>
                </div>

                <!-- Linha do Tempo de Histórico -->
                <div class="space-y-3">
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wide border-b border-gray-700 pb-1">Histórico de Atividades</h3>
                    <div id="interactionTimeline" class="space-y-4 max-h-[250px] overflow-y-auto pr-2">
                        <!-- Conteúdo injetado pelo JS -->
                    </div>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="p-4 border-t border-gray-700 flex justify-between bg-gray-850">
                <button onclick="salvarAlteracoesLead()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> Salvar Edições
                </button>
                <button onclick="fecharModal()" class="bg-gray-700 hover:bg-gray-600 text-white px-5 py-2 rounded-lg text-sm font-semibold">
                    Fechar
                </button>
            </div>

        </div>
    </div>

    <!-- JavaScript para o App -->
    <script>
        let leads = JSON.parse(localStorage.getItem('crm_leads_pro')) || [];
        let leadAtivoUuid = null;

        function initIcons() {
            lucide.createIcons();
        }

        // Renderização Principal do Funil
        function renderKanban() {
            const colunas = {
                'lista': document.getElementById('col-lista'),
                'abordagem': document.getElementById('col-abordagem'),
                'apresentacao': document.getElementById('col-apresentacao'),
                'followup': document.getElementById('col-followup'),
                'fechado': document.getElementById('col-fechado')
            };

            Object.values(colunas).forEach(col => col.innerHTML = '');
            const contadores = { 'lista': 0, 'abordagem': 0, 'apresentacao': 0, 'followup': 0, 'fechado': 0 };

            leads.forEach(lead => {
                contadores[lead.etapa]++;
                
                const card = document.createElement('div');
                card.className = "bg-gray-800 p-4 rounded-lg border border-gray-700 shadow-md hover:border-indigo-500 transition-all flex flex-col gap-2 cursor-grab active:cursor-grabbing";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] text-gray-500 font-mono font-bold">${lead.uuid.substring(0,8)}...</span>
                        <div class="flex gap-1.5">
                            <button onclick="abrirModal('${lead.uuid}')" class="text-gray-400 hover:text-indigo-400 transition-colors" title="Ver Histórico e Editar">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                            <button onclick="excluirLead('${lead.uuid}')" class="text-gray-500 hover:text-red-500 transition-colors" title="Excluir Permanentemente">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <h4 class="font-bold text-white text-md cursor-pointer hover:underline" onclick="abrirModal('${lead.uuid}')">${lead.nome}</h4>
                    <p class="text-sm text-indigo-400 font-semibold">R$ ${parseFloat(lead.valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                    
                    <!-- Última Observação Simplificada no Card -->
                    ${lead.historico_conversas && lead.historico_conversas.length > 0 ? `
                        <div class="bg-gray-900/60 p-2 rounded text-[11px] text-gray-400 italic line-clamp-2 border-l-2 border-indigo-500">
                            "${lead.historico_conversas[0].texto}"
                        </div>
                    ` : ''}

                    <div class="text-[10px] text-gray-500 mt-1 flex justify-between items-center">
                        <span>Criado em: ${new Date(lead.criado_em).toLocaleDateString()}</span>
                    </div>
                    
                    <!-- Navegação do Pipeline -->
                    <div class="flex justify-between mt-2 pt-2 border-t border-gray-700">
                        <button onclick="mover('${lead.uuid}', 'voltar')" class="text-xs text-gray-400 hover:text-white flex items-center gap-1 ${lead.etapa === 'lista' ? 'invisible' : ''}">
                            <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Voltar
                        </button>
                        <button onclick="mover('${lead.uuid}', 'avancar')" class="text-xs text-indigo-400 hover:text-indigo-300 font-semibold flex items-center gap-1 ${lead.etapa === 'fechado' ? 'invisible' : ''}">
                            Avançar <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                `;
                colunas[lead.etapa].appendChild(card);
            });

            Object.keys(contadores).forEach(etapa => {
                document.getElementById(`count-${etapa}`).innerText = contadores[etapa];
            });

            localStorage.setItem('crm_leads_pro', JSON.stringify(leads));
            initIcons();
        }

        // Criar Novo Lead
        function criarLead() {
            const nomeInput = document.getElementById('leadName');
            const valorInput = document.getElementById('leadValue');

            if (!nomeInput.value.trim()) {
                alert('Por favor, digite o nome da empresa.');
                return;
            }

            const novoLead = {
                uuid: crypto.randomUUID(),
                nome: nomeInput.value,
                valor: valorInput.value || 0,
                etapa: 'lista',
                criado_em: new Date().toISOString(),
                historico_mudancas: [
                    { etapa: 'lista', data: new Date().toISOString() }
                ],
                historico_conversas: [] // Guarda observações de conversação
            };

            leads.unshift(novoLead); // Insere no topo da lista
            renderKanban();

            nomeInput.value = '';
            valorInput.value = '';
        }

        // Mover Etapas do Kanban
        const sequenciaEtapas = ['lista', 'abordagem', 'apresentacao', 'followup', 'fechado'];
        function mover(uuid, direcao) {
            const lead = leads.find(l => l.uuid === uuid);
            if (!lead) return;

            let indexAtual = sequenciaEtapas.indexOf(lead.etapa);
            if (direcao === 'avancar' && indexAtual < sequenciaEtapas.length - 1) {
                lead.etapa = sequenciaEtapas[indexAtual + 1];
            } else if (direcao === 'voltar' && indexAtual > 0) {
                lead.etapa = sequenciaEtapas[indexAtual - 1];
            }

            lead.historico_mudancas.push({
                etapa: lead.etapa,
                data: new Date().toISOString()
            });

            renderKanban();
        }

        // Excluir Lead
        function excluirLead(uuid) {
            if (confirm('Quer mesmo remover este lead permanentemente?')) {
                leads = leads.filter(l => l.uuid !== uuid);
                renderKanban();
            }
        }

        // --- SISTEMA DE DIALOG / MODAL DE DETALHES ---
        function abrirModal(uuid) {
            const lead = leads.find(l => l.uuid === uuid);
            if (!lead) return;

            leadAtivoUuid = uuid;
            document.getElementById('modalLeadTitle').innerText = lead.nome;
            document.getElementById('modalLeadUUID').innerText = `UUID: ${lead.uuid}`;
            document.getElementById('modalEditNome').value = lead.nome;
            document.getElementById('modalEditValor').value = lead.valor;
            document.getElementById('newInteraction').value = '';

            renderLinhaDoTempo(lead);
            document.getElementById('modalLead').classList.remove('hidden');
            initIcons();
        }

        function fecharModal() {
            document.getElementById('modalLead').classList.add('hidden');
            leadAtivoUuid = null;
        }

        function renderLinhaDoTempo(lead) {
            const timeline = document.getElementById('interactionTimeline');
            timeline.innerHTML = '';

            if (!lead.historico_conversas || lead.historico_conversas.length === 0) {
                timeline.innerHTML = '<p class="text-xs text-gray-500 italic">Nenhum registro de conversa salvo ainda.</p>';
                return;
            }

            lead.historico_conversas.forEach((int, index) => {
                const item = document.createElement('div');
                item.className = "bg-gray-900 p-3 rounded border border-gray-750 space-y-1 relative group";
                item.innerHTML = `
                    <div class="flex justify-between items-center text-[11px] text-indigo-400 font-bold">
                        <span>Observação Registrada</span>
                        <div class="flex items-center gap-2">
                            <span class="text-gray-500 font-normal">${new Date(int.data).toLocaleString()}</span>
                            <button onclick="excluirComentario(${index})" class="text-gray-500 hover:text-red-500 transition-colors md:opacity-0 group-hover:opacity-100" title="Apagar comentário">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-xs text-gray-200 whitespace-pre-wrap">${int.texto}</p>
                `;
                timeline.appendChild(item);
            });
        }

        // Função para apagar um comentário específico
        function excluirComentario(index) {
            const lead = leads.find(l => l.uuid === leadAtivoUuid);
            if (!lead) return;

            if (confirm("Deseja mesmo apagar esta observação do histórico?")) {
                lead.historico_conversas.splice(index, 1);
                renderLinhaDoTempo(lead);
                renderKanban();
            }
        }

        // Adicionar Interação (Nova Conversa)
        function adicionarInteracao() {
            const textoInput = document.getElementById('newInteraction');
            const texto = textoInput.value.trim();

            if (!texto) {
                alert('Digite alguma anotação antes de salvar.');
                return;
            }

            const lead = leads.find(l => l.uuid === leadAtivoUuid);
            if (!lead) return;

            // Garante inicialização se não houver
            if (!lead.historico_conversas) lead.historico_conversas = [];

            lead.historico_conversas.unshift({
                data: new Date().toISOString(),
                texto: texto
            });

            textoInput.value = '';
            renderLinhaDoTempo(lead);
            renderKanban();
        }

        // Salvar alterações rápidas feitas nos inputs do modal
        function salvarAlteracoesLead() {
            const lead = leads.find(l => l.uuid === leadAtivoUuid);
            if (!lead) return;

            const nomeEditado = document.getElementById('modalEditNome').value.trim();
            const valorEditado = document.getElementById('modalEditValor').value;

            if (!nomeEditado) {
                alert('O nome da empresa não pode ficar em branco.');
                return;
            }

            lead.nome = nomeEditado;
            lead.valor = valorEditado || 0;

            renderKanban();
            fecharModal();
        }

        // --- SISTEMAS DE IMPORTAÇÃO E EXPORTAÇÃO ---
        function exportarJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(leads, null, 4));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `mind_crm_leads_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importarJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const dadosImportados = JSON.parse(e.target.result);
                    
                    if (Array.isArray(dadosImportados)) {
                        // Faz um merge simples ou substituição total após confirmação do usuário
                        if (confirm(`Deseja importar ${dadosImportados.length} contatos? Isso substituirá os registros atuais no seu navegador.`)) {
                            
                            // Normalização dos dados para evitar quebras se vier sem histórico
                            leads = dadosImportados.map(lead => ({
                                uuid: lead.uuid || crypto.randomUUID(),
                                nome: lead.nome || 'Empresa Sem Nome',
                                valor: lead.valor || 0,
                                etapa: lead.etapa || 'lista',
                                criado_em: lead.criado_em || new Date().toISOString(),
                                historico_mudancas: lead.historico_mudancas || [],
                                historico_conversas: lead.historico_conversas || []
                            }));

                            renderKanban();
                            alert('Dados importados com sucesso!');
                        }
                    } else {
                        alert('Formato de JSON inválido. Deve ser um array de empresas.');
                    }
                } catch (error) {
                    alert('Erro ao processar o arquivo JSON. Certifique-se de que é um JSON válido.');
                }
            };
            reader.readAsText(file);
        }

        window.onload = () => {
            renderKanban();
        };
    </script>
</body>
</html>
