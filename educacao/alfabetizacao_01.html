<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Alfabetização</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --bg: #f7f9fc;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 600px;
            border: 5px solid var(--secondary);
        }

        h1 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .menu {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 15px;
            padding: 10px 15px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        button:active { transform: scale(0.95); }

        .btn-category {
            background: var(--bg);
            border: 2px solid var(--secondary);
        }

        .btn-category.active {
            background: var(--secondary);
            color: white;
        }

        .card {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .palavra {
            font-size: 4.5rem;
            margin: 0;
            color: #2d3436;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .detalhe {
            font-size: 1.8rem;
            color: var(--primary);
            margin-top: 10px;
            min-height: 1.8rem;
            opacity: 1; /* Modificado: Sempre visível */
        }

        .controles {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-principal {
            background: var(--primary);
            color: white;
            font-size: 1.2rem;
            padding: 15px 30px;
            width: 100%;
        }

        .stats {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>JOGO DAS PALAVRAS</h1>

            <button class="btn-category" onclick="setCategory('tempo_lugar_opiniao', this)">Tempo/Lugar</button>
        </div>

        <div class="card">

        const indices = {
            todas: 0, monossilabas: 0, dissilabas: 0, trissilabas: 0,
            encontros_vocalicos: 0, artigos_e_conectivos: 0, 
            pessoas_e_posses: 0, verbos_curtos: 0, tempo_lugar_opiniao: 0
        };

        function setCategory(cat, btn) {
            categoriaAtual = cat;
            
            document.querySelectorAll('.btn-category').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Renderiza direto a palavra salva do índice atual da categoria escolhida
            renderizarPalavra();
        }

        function prepararLista() {
            if (categoriaAtual === 'todas') {
                listaAtual = [
                    ...dados.monossilabas, 
                    ...dados.dissilabas, 
                    ...dados.trissilabas,
                    ...dados.encontros_vocalicos,
                    ...dados.artigos_e_conectivos,
                    ...dados.pessoas_e_posses,
                    ...dados.verbos_curtos,
                    ...dados.tempo_lugar_opiniao
                ];
            } else {
                listaAtual = [...dados[categoriaAtual]];
            }
        }

        function renderizarPalavra() {
            prepararLista();

            // Evita que o índice estoure caso a lista mude de tamanho
            if (indices[categoriaAtual] >= listaAtual.length) {
                indices[categoriaAtual] = 0; 
            }

            const palavraAtiva = listaAtual[indices[categoriaAtual]];

            const txtPalavra = document.getElementById('txt-palavra');
            const txtDetalhe = document.getElementById('txt-detalhe');
            
            txtPalavra.innerText = palavraAtiva.palavra;
            txtDetalhe.innerText = palavraAtiva.silabas;

            // Mostra a contagem correta e o progresso linear
            const posicaoAtual = listaAtual.length > 0 ? indices[categoriaAtual] + 1 : 0;
            document.getElementById('stats').innerText = `Modo: ${categoriaAtual.replace(/_/g, ' ')} | Palavra: ${posicaoAtual} de ${listaAtual.length}`;
        }

        function proximaPalavra() {
            prepararLista();
            
            // Avança sequencialmente
            indices[categoriaAtual]++;
            if (indices[categoriaAtual] >= listaAtual.length) {
                indices[categoriaAtual] = 0; // Volta ao início da lista
            }
            
            renderizarPalavra();
        }

        // Iniciar jogo com a primeira palavra da categoria 'todas'
        renderizarPalavra();
    </script>
</body>
</html>
