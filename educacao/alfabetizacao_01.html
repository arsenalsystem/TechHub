<head>
    <meta charset="UTF-8">

    <title>Jogo de Alfabetização</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --bg: #f7f9fc;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            border: 5px solid var(--secondary);
        }

        h1 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .menu {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 15px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        button:active { transform: scale(0.95); }

        .btn-category {
            background: var(--bg);
            border: 2px solid var(--secondary);
        }

        .btn-category.active {
            background: var(--secondary);
            color: white;
        }

        .card {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .palavra {
            font-size: 5rem;
            margin: 0;
            color: #2d3436;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .detalhe {
            font-size: 1.8rem;
            color: var(--primary);
            margin-top: 10px;
            min-height: 1.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .detalhe.show {
            opacity: 1;
        }

        .controles {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-principal {
            background: var(--primary);
            color: white;
            font-size: 1.2rem;
            padding: 15px 30px;
        }

        .btn-ajuda {
            background: var(--accent);
            color: #5d5d5d;
        }

        .stats {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>

        </div>

        <div class="card">

        let categoriaAtual = 'todas';
        let listaAtual = [];
        let palavraAtiva = null;

        function setCategory(cat, btn) {
            categoriaAtual = cat;
            
            // Estilo dos botões
            document.querySelectorAll('.btn-category').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            proximaPalavra();
        }

        function prepararLista() {
            if (categoriaAtual === 'todas') {
                listaAtual = [...dados.monossilabas, ...dados.dissilabas, ...dados.trissilabas];
            } else {
                listaAtual = [...dados[categoriaAtual]];
            }
        }

        function proximaPalavra() {
            prepararLista();
            
            // Sorteia uma palavra
            const index = Math.floor(Math.random() * listaAtual.length);
            palavraAtiva = listaAtual[index];

            // Atualiza tela
            const txtPalavra = document.getElementById('txt-palavra');
            const txtDetalhe = document.getElementById('txt-detalhe');
            
            txtPalavra.innerText = palavraAtiva.palavra;
            txtDetalhe.innerText = palavraAtiva.silabas || palavraAtiva.exemplo;
            
            // Esconde o detalhe para a criança tentar ler primeiro
            txtDetalhe.classList.remove('show');

            document.getElementById('stats').innerText = `Modo: ${categoriaAtual} | Total: ${listaAtual.length} palavras`;
        }
